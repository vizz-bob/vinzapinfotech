###############################################################
# Vinzapinfotech — Production Nginx Configuration
# Optimized for: Performance, Security, SEO, Gzip, HTTP/2
###############################################################

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;           # Hide nginx version

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml
        text/html;

    # ── Main Server Block ──
    server {
        listen 80;
        server_name vinzapinfotech.com www.vinzapinfotech.com localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security Headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://pagead2.googlesyndication.com https://www.googletagmanager.com https://www.googletagservices.com https://adservice.google.com https://adservice.google.co.in https://www.google-analytics.com https://partner.googleadservices.com https://tpc.googlesyndication.com https://hn.algolia.com https://remotive.com https://fonts.googleapis.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com https://rcm-na.amazon-adsystem.com; img-src 'self' data: https: http:;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Cache HTML — No cache (always fresh) ──
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            try_files $uri $uri/ =404;
        }

        # ── Cache static assets — Long cache ──
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Sitemap & robots — Short cache ──
        location ~* \.(xml|txt)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── Main routing ──
        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        # ── Custom 404 page ──
        error_page 404 /index.html;
        location = /index.html {
            internal;
        }

        # ── Block unwanted bots ──
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Health check endpoint ──
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
