name: 🚀 Vinzap CI/CD — Build, Test & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

env:
  AWS_REGION: us-east-1
  S3_BUCKET: vinzapinfotech.com
  CLOUDFRONT_DISTRIBUTION_ID: E3LBDJFANT9F4V
  SITE_URL: https://www.vinzapinfotech.com
  EC2_HOST: 3.225.142.65
  EC2_USERNAME: ubuntu
  EC2_WEB_ROOT: /usr/share/nginx/html   # matches root in nginx/nginx.conf

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: BUILD & MINIFY ALL HTML
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build & Minify HTML
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install minifier
        run: npm install -g html-minifier-terser

      - name: 📁 Create build directory
        run: mkdir -p build/blog

      - name: 🗜️ Minify root HTML files
        run: |
          for file in *.html; do
            echo "→ Minifying $file"
            html-minifier-terser \
              --collapse-whitespace \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              --use-short-doctype \
              --minify-css true \
              "$file" -o "build/$file" || cp "$file" "build/$file"
          done

      - name: 🗜️ Minify blog HTML files
        run: |
          if [ -d "blog" ]; then
            for file in blog/*.html; do
              fname=$(basename "$file")
              echo "→ Minifying blog/$fname"
              html-minifier-terser --collapse-whitespace --minify-css true \
                "$file" -o "build/blog/$fname" || cp "$file" "build/blog/$fname"
            done
          fi

      - name: 📋 Copy static files (sitemap, robots, ads.txt)
        run: |
          cp sitemap.xml build/   2>/dev/null || true
          cp robots.txt  build/   2>/dev/null || true
          cp ads.txt     build/   2>/dev/null || true
          cp BingSiteAuth.xml build/ 2>/dev/null || true
          cp -r images   build/   2>/dev/null || true
          cp -r assets   build/   2>/dev/null || true

      - name: 📊 Build report
        run: |
          echo "Files in build:"
          find build/ -type f | sort
          echo ""
          echo "Total size: $(du -sh build/ | cut -f1)"

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: build/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: DEPLOY TO AWS S3 + CLOUDFRONT
  # ─────────────────────────────────────────────
  deploy-s3:
    name: ☁️ Deploy → S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ env.SITE_URL }}

    steps:
      - name: 📥 Download build
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: build/

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☁️ Upload HTML (no-cache)
        run: |
          aws s3 sync build/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" \
            --include "*.html"
          echo "✅ HTML files uploaded"

      - name: ☁️ Upload sitemap & SEO files
        run: |
          aws s3 sync build/ s3://${{ env.S3_BUCKET }}/ \
            --cache-control "public, max-age=86400" \
            --exclude "*" \
            --include "*.xml" \
            --include "*.txt"
          echo "✅ SEO files uploaded"

      - name: ☁️ Upload static assets (long cache)
        run: |
          aws s3 sync build/ s3://${{ env.S3_BUCKET }}/ \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt"
          echo "✅ Assets uploaded"

      - name: ⚡ Invalidate CloudFront cache
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation: $INV_ID — waiting..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id "$INV_ID"
          echo "✅ CloudFront cache cleared"

  # ─────────────────────────────────────────────
  # JOB 3: DEPLOY TO EC2 (nginx — no Docker)
  # ─────────────────────────────────────────────
  deploy-ec2:
    name: 🖥️ Deploy → EC2 (nginx)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ env.SITE_URL }}

    steps:
      - name: 📥 Download build
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: build/

      - name: 🔐 Setup SSH key (Vinzap1.pem)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/vinzap.pem
          chmod 600 ~/.ssh/vinzap.pem
          # Avoid interactive host-key prompt
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 📂 Create web root on EC2 (if not exists)
        run: |
          ssh -i ~/.ssh/vinzap.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} \
              "sudo mkdir -p ${{ env.EC2_WEB_ROOT }}/blog && \
               sudo chown -R ${{ env.EC2_USERNAME }}:${{ env.EC2_USERNAME }} ${{ env.EC2_WEB_ROOT }}"

      - name: 📡 Rsync build files to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/vinzap.pem -o StrictHostKeyChecking=no" \
            build/ \
            ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }}:${{ env.EC2_WEB_ROOT }}/
          echo "✅ Files synced to EC2"

      - name: 🔄 Reload nginx on EC2
        run: |
          ssh -i ~/.ssh/vinzap.pem \
              -o StrictHostKeyChecking=no \
              ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} \
              "sudo nginx -t && sudo systemctl reload nginx && echo '✅ Nginx reloaded'"

      - name: 🌐 Health check EC2
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://${{ env.EC2_HOST }}/ || echo "000")
          echo "EC2 direct HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
            echo "✅ EC2 is serving the site!"
          else
            echo "⚠️  Got $STATUS — check nginx on EC2"
          fi

  # ─────────────────────────────────────────────
  # JOB 4: PING GOOGLE + BING (after both deploys)
  # ─────────────────────────────────────────────
  seo-ping:
    name: 📡 Ping Google & Bing
    runs-on: ubuntu-latest
    needs: [deploy-s3, deploy-ec2]

    steps:
      - name: 🔔 Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=${{ env.SITE_URL }}/sitemap.xml" \
            -w "\nStatus: %{http_code}" || true
          echo "✅ Google pinged"

      - name: 🔔 Ping Bing sitemap
        run: |
          curl -s "https://www.bing.com/ping?sitemap=${{ env.SITE_URL }}/sitemap.xml" \
            -w "\nStatus: %{http_code}" || true
          echo "✅ Bing pinged"

      - name: ✅ Final summary
        run: |
          echo "════════════════════════════════════"
          echo "  🎉 DEPLOYMENT COMPLETE"
          echo "════════════════════════════════════"
          echo "  Site:    ${{ env.SITE_URL }}"
          echo "  EC2:     ${{ env.EC2_HOST }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Time:    $(date)"
          echo "════════════════════════════════════"
